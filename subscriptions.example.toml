# Copy to ~/.paper-search/subscriptions.toml. Registry subscriptions install
# independently distributed search and material providers; they do not make
# External Search v1 available.
schemaVersion = 1

[subscriptions.official-search]
runtimeKind = "search"
url = "https://github.com/X-T-E-R/resource-search-providers/releases/download/providers-registry-latest/registry.json"
enabled = true

[subscriptions.official-material]
runtimeKind = "material"
url = "https://github.com/X-T-E-R/material-providers/releases/download/material-registry-latest/registry.json"
enabled = true
