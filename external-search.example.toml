# Copy this file to ~/.paper-search/external-search.toml (or the root selected
# by an absolute PAPER_SEARCH_HOME). It grants optional External Search v1
# process authority and is intentionally separate from layered config.
schemaVersion = 1
enabled = true
adapter = "native"
timeoutMs = 300000

[process]
executable = "python"
args = ["C:/Programs/AI/Search/systems/search-layer/scripts/paper_search_external.py"]
workingDirectory = "C:/Programs/AI/Search/systems/search-layer"
