schemaVersion = 1

[providers]
installDir = "~/.paper-search/providers"
autoUpdate = false
allowReleaseFallback = true

[workspace]
root = "~/.paper-search/workspace"
defaultSink = "workspace"
defaultCollection = "inbox"

# Material files, portable exports, and durable history are independent from
# workspace bibliographic records. Relative paths in an explicit config remain
# relative to that config file; these conventional defaults are user-wide.
[storage]
artifactRoot = "~/.paper-search/storage/artifacts"
extractionRoot = "~/.paper-search/storage/extractions"
exportRoot = "~/.paper-search/exports"

[runs]
root = "~/.paper-search/runs"
# -1 means that age alone never makes a run eligible for explicit pruning.
maxAgeDays = -1

# Optional CLI-only bibliographic sink. It does not import attachments.
[zotero]
enabled = false
endpoint = "http://127.0.0.1:23120/mcp"
timeoutMs = 15000
unavailable = "error"

[server]
enabled = false
transport = "http"
host = "127.0.0.1"
port = 23121

[defaults]
timeoutMs = 30000
maxResults = 10

[output]
format = "table"
locale = "zh-CN"
prettyJson = true

[smoke]
enabled = true
envVar = "PAPER_SEARCH_RUN_SMOKE"

[search]
defaultAcademicPresets = ["general"]
defaultPatentPresets = ["patents"]

# User tags are additive local source sets. Built-in taxonomy is unchanged.
[search.classifications.lab-preferred]
sources = ["crossref", "openalex"]

# Built-in preset names are reserved. Extend one under a new name instead.
[search.presets.my-general]
extends = ["general"]
include = ["tag:lab-preferred"]
exclude = ["source:semantic"]

# Compatibility policy for implicit defaults. New requests should prefer
# presets/categories/sources; this section does not redefine literal `all`.
[search.selection]
mode = "defaults"
includeIds = []
excludeIds = []
includeDomains = []
excludeDomains = []
includeContentKinds = []
excludeContentKinds = []
includeAccess = []
excludeAccess = []

[platform.crossref]
enabled = true
maxResults = 25
defaultSort = "citations"

[platform.patentstar]
enabled = false
loginName = ""
maxResults = 20

[platform.ieee]
enabled = false

[platform.sciencedirect]
enabled = false

[platform.scopus]
enabled = false

[platform.springer]
enabled = false

[platform.wos]
enabled = false
database = "WOS"
